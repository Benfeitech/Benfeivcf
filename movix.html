<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinvex Pro - Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --netflix-red: #E50914; --bg-black: #080808; }
        body { background-color: var(--bg-black); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        .hero-gradient { background: linear-gradient(0deg, var(--bg-black) 0%, transparent 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bottom-nav { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); border-top: 1px solid #222; }
        .movie-card { transition: transform 0.3s ease; flex: 0 0 auto; width: 130px; }
        .movie-card:active { transform: scale(0.95); }
        .skeleton { background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-24">

    <section id="hero" class="relative w-full h-[65vh] overflow-hidden">
        <div id="hero-img" class="absolute inset-0 bg-cover bg-center opacity-0 transition-opacity duration-1000"></div>
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="absolute bottom-0 left-0 p-6 w-full space-y-3">
            <img id="hero-logo" src="" class="h-12 mb-2 hidden" alt="logo">
            <h1 id="hero-title" class="text-3xl font-bold italic tracking-tighter">FETCHING LATEST...</h1>
            <p id="hero-desc" class="text-sm text-gray-300 line-clamp-2 max-w-sm"></p>
            <div class="flex gap-3 pt-2">
                <button class="bg-white text-black px-6 py-2 rounded-sm font-bold flex items-center gap-2"><i class="fa-solid fa-play"></i> Play</button>
                <button class="bg-gray-500/50 text-white px-6 py-2 rounded-sm font-bold backdrop-blur-md"><i class="fa-solid fa-circle-info"></i> Info</button>
            </div>
        </div>
    </section>

    <main class="mt-6 space-y-8" id="main-content">
        <div class="px-4">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Available On</h2>
            <div id="platforms" class="flex gap-3 overflow-x-auto no-scrollbar"></div>
        </div>

        <div class="px-4">
            <h2 class="text-lg font-bold mb-3">Trending Now</h2>
            <div id="trending-row" class="flex gap-3 overflow-x-auto no-scrollbar">
                <div class="skeleton w-32 h-48 rounded-md"></div>
                <div class="skeleton w-32 h-48 rounded-md"></div>
                <div class="skeleton w-32 h-48 rounded-md"></div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 h-16 bottom-nav flex justify-around items-center z-50">
        <div class="flex flex-col items-center text-red-600 cursor-pointer">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] mt-1">Movies</span>
        </div>
        <div class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fa-solid fa-magnifying-glass text-lg"></i>
            <span class="text-[10px] mt-1">Search</span>
        </div>
        <div class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fa-solid fa-download text-lg"></i>
            <span class="text-[10px] mt-1">Downloads</span>
        </div>
        <div class="flex flex-col items-center text-gray-500 cursor-pointer">
            <i class="fa-solid fa-circle-info text-lg"></i>
            <span class="text-[10px] mt-1">About</span>
        </div>
    </nav>

    <script>
        const CONFIG = {
    API_BASE: 'https://movieapi.giftedtech.co.ke/api/v2',
    API_KEY: 'gifted_movieapi_789fbud2389889dg8962e098g23d6'
};

async function initApp() {
    // We wrap the URL in a CORS Proxy (AllOrigins)
    const targetUrl = `${CONFIG.API_BASE}/homepage`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

    try {
        const response = await fetch(proxyUrl);
        
        if (!response.ok) throw new Error("Proxy connection failed.");

        const proxyData = await response.json();
        
        // AllOrigins returns the API data as a string inside 'contents'
        // We need to parse that string back into a JSON object
        const data = JSON.parse(proxyData.contents);
        
        if (data.success && data.results) {
            renderUI(data.results);
            console.log("Data loaded successfully!");
        } else {
            console.error("API returned success:false", data);
        }
    } catch (err) {
        console.error("Fetch Error:", err);
        document.getElementById('hero-title').innerText = "Data Fetch Failed";
        alert("Check your internet or API Key. Error: " + err.message);
    }
}

function renderUI(results) {
    // 1. Render Platforms
    const platformList = document.getElementById('platforms');
    if (results.platformList) {
        platformList.innerHTML = '';
        results.platformList.forEach(p => {
            const div = document.createElement('div');
            div.className = "bg-[#1a1a1a] border border-gray-800 px-4 py-1.5 rounded-full text-xs whitespace-nowrap";
            div.innerText = p.name;
            platformList.appendChild(div);
        });
    }

    // 2. Render Hero (First item in Banner list)
    const bannerData = results.operatingList?.find(o => o.type === "BANNER");
    if (bannerData && bannerData.banner.items.length > 0) {
        const hero = bannerData.banner.items[0];
        const heroImg = document.getElementById('hero-img');
        
        // Transition in the background image
        heroImg.style.backgroundImage = `url(${hero.image.url})`;
        heroImg.style.opacity = "1";
        
        document.getElementById('hero-title').innerText = hero.title;
        document.getElementById('hero-desc').innerText = hero.subject.description;
    }

    // 3. Render Trending Grid
    const trendingRow = document.getElementById('trending-row');
    trendingRow.innerHTML = '';
    
    // Grabbing movies from the operatingList
    const movies = bannerData ? bannerData.banner.items : [];
    
    movies.forEach(m => {
        const movie = m.subject;
        const card = document.createElement('div');
        card.className = "movie-card";
        card.innerHTML = `
            <div class="relative w-full h-44 rounded-md overflow-hidden bg-[#1a1a1a] shadow-lg border border-white/5">
                <img src="${movie.cover.url}" class="w-full h-full object-cover" loading="lazy">
                <div class="absolute top-1 right-1 bg-black/70 px-1.5 py-0.5 rounded text-[10px] font-bold text-yellow-400">
                    ★ ${movie.imdbRatingValue || 'N/A'}
                </div>
            </div>
            <p class="text-[11px] mt-2 font-medium truncate text-gray-200">${movie.title}</p>
        `;
        trendingRow.appendChild(card);
    });
}

// Start the app
initApp();

    </script>
</body>
</html>
