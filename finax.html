<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bank Account Verification</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Poppins',sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
padding:30px;
}

.container{
background:white;
width:100%;
max-width:450px;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
text-align:center;
margin-bottom:20px;
color:#2c3e50;
}

label{
font-size:14px;
font-weight:500;
display:block;
margin-top:15px;
}

select,input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ddd;
margin-top:6px;
font-size:14px;
}

input:focus,select:focus{
outline:none;
border-color:#4CAF50;
}

.verified{
color:#2ecc71;
font-size:14px;
margin-top:8px;
display:none;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:#2ecc71;
border:none;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

.saved{
margin-top:25px;
}

.account-card{
background:#f8f9ff;
padding:12px;
border-radius:6px;
margin-top:10px;
font-size:14px;
}

.account-card i{
color:#2ecc71;
margin-right:5px;
}

.loading{
color:#999;
font-size:13px;
margin-top:6px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2><i class="fa-solid fa-building-columns"></i> Verify Bank Account</h2>

<label>Select Bank</label>
<select id="bankList">
<option>Loading banks...</option>
</select>

<label>Account Number</label>
<input type="number" id="accountNumber" placeholder="Enter 10 digit account number" maxlength="10">

<div class="loading" id="loading">Checking account...</div>

<div class="verified" id="verified">
<i class="fa-solid fa-circle-check"></i>
<span id="accountName"></span>
</div>

<button onclick="saveAccount()">
<i class="fa-solid fa-floppy-disk"></i> Save Account
</button>

<div class="saved">
<h3>Saved Accounts</h3>
<div id="savedAccounts"></div>
</div>

</div>

<script>

const PUBLIC_KEY = "pub_nr2E23GqvHWP4er7pC1MIA33VXXRPDjFj4ftFdhB";

const bankSelect = document.getElementById("bankList");
const accountInput = document.getElementById("accountNumber");
const verifiedBox = document.getElementById("verified");
const accountNameText = document.getElementById("accountName");
const loading = document.getElementById("loading");
const savedAccounts = document.getElementById("savedAccounts");

let currentAccountName = "";


/* LOAD BANK LIST */
async function loadBanks(){

try{

const res = await fetch(`https://strowallet.com/api/banks/lists/?public_key=${PUBLIC_KEY}`);

const result = await res.json();

bankSelect.innerHTML="";

const banks = result.data.bank_list;

banks.forEach(bank => {

const option = document.createElement("option");

option.value = bank.bankCode;
option.textContent = bank.bankName;

bankSelect.appendChild(option);

});

}catch(error){

console.error(error);

bankSelect.innerHTML="<option>Failed to load banks</option>";

}

}

loadBanks();


/* VERIFY ACCOUNT NUMBER */
accountInput.addEventListener("input",async ()=>{

const accountNumber = accountInput.value;

if(accountNumber.length === 10){

verifyAccount(accountNumber);

}else{

verifiedBox.style.display="none";

}

});


async function verifyAccount(accountNumber){

const bankCode = bankSelect.value;

loading.style.display="block";
verifiedBox.style.display="none";

try{

const res = await fetch(`https://strowallet.com/api/banks/get-customer-name/?public_key=${PUBLIC_KEY}&bank_code=${bankCode}&account_number=${accountNumber}`);

const data = await res.json();

loading.style.display="none";

if(data.status === true){

currentAccountName = data.data.account_name;

accountNameText.textContent = currentAccountName;

verifiedBox.style.display="block";

}else{

verifiedBox.style.display="none";

}

}catch(err){

loading.style.display="none";

}

}


/* SAVE ACCOUNT */
function saveAccount(){

const bankName = bankSelect.options[bankSelect.selectedIndex].text;
const accountNumber = accountInput.value;

if(!currentAccountName){

alert("Please verify account first");

return;

}

const card = document.createElement("div");

card.className="account-card";

card.innerHTML=`
<i class="fa-solid fa-circle-check"></i>
<b>${currentAccountName}</b><br>
${bankName} - ${accountNumber}
`;

savedAccounts.appendChild(card);

accountInput.value="";
verifiedBox.style.display="none";

}

</script>

</body>
</html>
